<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101a2c"/><stop offset=".55" stop-color="#0a0d14"/>
    </linearGradient>
    <linearGradient id="cap" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#241a0e"/><stop offset="1" stop-color="#0a0d14"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- header -->
  <text x="60" y="58" fill="#3fd6c2" font-family="IBM Plex Mono, monospace" font-size="13" letter-spacing="5">NEXUS · DECISION TWIN</text>
  <text x="60" y="98" fill="#e7e3d8" font-family="Fraunces, serif" font-size="27">“Why did Brazil fail — and what else is now at risk?”</text>

  <!-- the broken belief -->
  <g>
    <rect x="60" y="132" width="1080" height="64" rx="10" fill="#3a1c16" stroke="#ff7a4d" stroke-width="1.2"/>
    <text x="80" y="160" fill="#ff7a4d" font-family="IBM Plex Mono, monospace" font-size="11" letter-spacing="2">▲ THE BELIEF THAT BROKE  ·  SEALED 45 DAYS BEFORE THE OUTCOME</text>
    <text x="80" y="183" fill="#ffd9cb" font-size="16">“Brazil consumer demand grows &gt;18% YoY”  —  reality settled it <tspan fill="#ff7a4d" font-weight="600">false</tspan>: demand grew ~6%.</text>
    <circle cx="1110" cy="164" r="6" fill="#ff7a4d"><animate attributeName="opacity" values="1;.25;1" dur="1.4s" repeatCount="indefinite"/></circle>
  </g>

  <!-- four decisions draining -->
  <g font-size="14">
    <!-- row template: name, before bar (verify) shrinking to after (ember), $ -->
    <!-- Mexico -->
    <g transform="translate(60,222)">
      <text x="0" y="16" fill="#e7e3d8" font-weight="600">Open the Mexico expansion (FY+1)</text>
      <text x="0" y="36" fill="#9aa3b2" font-size="12">expansion · rests on the broken belief</text>
      <rect x="640" y="6" width="320" height="9" rx="4" fill="#141d2e"/>
      <rect x="640" y="6" width="320" height="9" rx="4" fill="#3fd6c2">
        <animate attributeName="width" values="320;320;48" keyTimes="0;.3;.62" dur="6s" begin="0.6s" fill="freeze"/>
        <animate attributeName="fill" values="#3fd6c2;#3fd6c2;#ff7a4d" keyTimes="0;.3;.62" dur="6s" begin="0.6s" fill="freeze"/>
      </rect>
      <text x="915" y="15" fill="#9aa3b2" font-family="IBM Plex Mono, monospace" font-size="12">59% → 9%</text>
      <text x="1080" y="15" fill="#e9c46a" font-family="IBM Plex Mono, monospace" font-size="12" text-anchor="end" opacity="0">$24.1M
        <animate attributeName="opacity" values="0;0;1" keyTimes="0;.6;.7" dur="6s" begin="0.6s" fill="freeze"/></text>
    </g>
    <!-- São Paulo -->
    <g transform="translate(60,288)">
      <text x="0" y="16" fill="#e7e3d8" font-weight="600">Build the São Paulo fulfilment center</text>
      <text x="0" y="36" fill="#9aa3b2" font-size="12">supply-chain · rests on the broken belief</text>
      <rect x="640" y="6" width="320" height="9" rx="4" fill="#141d2e"/>
      <rect x="640" y="6" width="320" height="9" rx="4" fill="#3fd6c2">
        <animate attributeName="width" values="320;320;184" keyTimes="0;.36;.66" dur="6s" begin="0.9s" fill="freeze"/>
        <animate attributeName="fill" values="#3fd6c2;#3fd6c2;#ff7a4d" keyTimes="0;.36;.66" dur="6s" begin="0.9s" fill="freeze"/>
      </rect>
      <text x="915" y="15" fill="#9aa3b2" font-family="IBM Plex Mono, monospace" font-size="12">68% → 39%</text>
      <text x="1080" y="15" fill="#e9c46a" font-family="IBM Plex Mono, monospace" font-size="12" text-anchor="end" opacity="0">$10.1M
        <animate attributeName="opacity" values="0;0;1" keyTimes="0;.66;.76" dur="6s" begin="0.9s" fill="freeze"/></text>
    </g>
    <!-- Pricing -->
    <g transform="translate(60,354)">
      <text x="0" y="16" fill="#e7e3d8" font-weight="600">Set the FY pricing for the LATAM tier</text>
      <text x="0" y="36" fill="#9aa3b2" font-size="12">pricing · rests on the broken belief</text>
      <rect x="640" y="6" width="320" height="9" rx="4" fill="#141d2e"/>
      <rect x="640" y="6" width="320" height="9" rx="4" fill="#3fd6c2">
        <animate attributeName="width" values="320;320;184" keyTimes="0;.42;.72" dur="6s" begin="1.2s" fill="freeze"/>
        <animate attributeName="fill" values="#3fd6c2;#3fd6c2;#ff7a4d" keyTimes="0;.42;.72" dur="6s" begin="1.2s" fill="freeze"/>
      </rect>
      <text x="915" y="15" fill="#9aa3b2" font-family="IBM Plex Mono, monospace" font-size="12">66% → 38%</text>
      <text x="1080" y="15" fill="#e9c46a" font-family="IBM Plex Mono, monospace" font-size="12" text-anchor="end" opacity="0">$3.4M
        <animate attributeName="opacity" values="0;0;1" keyTimes="0;.72;.82" dur="6s" begin="1.2s" fill="freeze"/></text>
    </g>
    <!-- Hiring -->
    <g transform="translate(60,420)">
      <text x="0" y="16" fill="#e7e3d8" font-weight="600">Stand up a 40-person LATAM sales org</text>
      <text x="0" y="36" fill="#9aa3b2" font-size="12">hiring · rests on the broken belief</text>
      <rect x="640" y="6" width="320" height="9" rx="4" fill="#141d2e"/>
      <rect x="640" y="6" width="320" height="9" rx="4" fill="#3fd6c2">
        <animate attributeName="width" values="320;320;184" keyTimes="0;.48;.78" dur="6s" begin="1.5s" fill="freeze"/>
        <animate attributeName="fill" values="#3fd6c2;#3fd6c2;#ff7a4d" keyTimes="0;.48;.78" dur="6s" begin="1.5s" fill="freeze"/>
      </rect>
      <text x="915" y="15" fill="#9aa3b2" font-family="IBM Plex Mono, monospace" font-size="12">63% → 36%</text>
      <text x="1080" y="15" fill="#e9c46a" font-family="IBM Plex Mono, monospace" font-size="12" text-anchor="end" opacity="0">$2.4M
        <animate attributeName="opacity" values="0;0;1" keyTimes="0;.78;.88" dur="6s" begin="1.5s" fill="freeze"/></text>
    </g>
  </g>

  <!-- untouched controls -->
  <text x="60" y="498" fill="#5b6573" font-size="12.5" font-style="italic">Untouched — independent of this belief:  EU data platform · 90-day enterprise sales motion</text>

  <!-- portfolio headline -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;.82;.9" dur="6s" begin="0.6s" fill="freeze"/>
    <rect x="60" y="524" width="1080" height="92" rx="12" fill="url(#cap)" stroke="#e9c46a" stroke-width="1.2"/>
    <text x="86" y="558" fill="#e9c46a" font-family="IBM Plex Mono, monospace" font-size="12" letter-spacing="2">ONE BROKEN BELIEF · WHOLE STRATEGY RE-SCORED</text>
    <text x="86" y="596" fill="#f3eee1" font-family="Fraunces, serif" font-size="26"><tspan fill="#e9c46a" font-weight="600">$40M</tspan> of committed capital repriced  ·  4 decisions re-ranked  ·  the twin learned</text>
  </g>

  <text x="60" y="648" fill="#5b6573" font-family="IBM Plex Mono, monospace" font-size="11">Deterministic read over the verified record — live at GET /twin/graph/propagate. Dollar figures are estimates (committed capital × Δconfidence).</text>
</svg>
